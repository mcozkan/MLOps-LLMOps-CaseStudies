services:
  postgres:
    image: postgres:15
    container_name: postgresql_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres_db
    ports:
     - "5433:5432"
    volumes:
     - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
